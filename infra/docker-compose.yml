# Sentinel local infrastructure — streaming spine (Phase 1) + governance
# scheduler (Phase 2).
#
#   docker compose -f infra/docker-compose.yml up -d                 # phase 1
#   docker compose -f infra/docker-compose.yml --profile airflow up -d  # + phase 2
#
# Brings up:
#   - redpanda          Kafka-compatible broker        localhost:9092
#   - redpanda-console  web UI for topics/messages     http://localhost:8080
#   - postgres          metrics + immutable audit log  localhost:5432
#                       (init.sql is applied on first boot)
#   - airflow           daily drift DAG scheduler      http://localhost:8081
#                       (opt-in via --profile airflow; heavy, ~1.5 GB image)
#
# Public data only; no secrets baked in. Override Postgres creds via a local
# .env (see .env.example) before anything real.

name: sentinel

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: sentinel-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Advertise localhost so host-run producer/consumer can connect.
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: sentinel-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092

  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Applied on FIRST boot only — subsequent restarts skip it. Re-applying
      # is idempotent (every CREATE is IF NOT EXISTS) if you exec into it.
      # Order matters: init (base tables + audit_log) then agents (memos etc).
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-sentinel-init.sql:ro
      - ./sql/agents.sql:/docker-entrypoint-initdb.d/02-sentinel-agents.sql:ro

  # Airflow — daily drift DAG scheduler. Opt-in (heavy image); enable with
  # `--profile airflow`. Uses `airflow standalone` so scheduler + webserver
  # run in one container, with its metadata in the same Postgres on schema
  # `airflow` (kept isolated from Sentinel's tables).
  airflow:
    image: apache/airflow:2.10.4-python3.11
    container_name: sentinel-airflow
    profiles: ["airflow"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: >-
        postgresql+psycopg2://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@postgres/${POSTGRES_DB:-sentinel}
      # Make the pipeline package importable inside the Airflow container.
      PYTHONPATH: /opt/airflow:/opt/airflow/pipeline
      # Sentinel runtime config (mirrors .env.example).
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-sentinel}:${POSTGRES_PASSWORD:-sentinel}@postgres:5432/${POSTGRES_DB:-sentinel}
    ports:
      - "8081:8080"
    volumes:
      - ../pipeline/dags:/opt/airflow/dags:ro
      - ../pipeline:/opt/airflow/pipeline:ro
      - ../models:/opt/airflow/models:ro
      - ../data:/opt/airflow/data:ro
      - airflow-logs:/opt/airflow/logs
    command: ["bash", "-c", "pip install --user confluent-kafka xgboost && airflow standalone"]

volumes:
  redpanda-data:
  postgres-data:
  airflow-logs:
