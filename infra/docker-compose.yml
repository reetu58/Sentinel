# Sentinel local infrastructure — the Phase 1 streaming spine.
#
#   docker compose -f infra/docker-compose.yml up -d
#
# Brings up:
#   - redpanda          Kafka-compatible broker        localhost:9092
#   - redpanda-console  web UI for topics/messages     http://localhost:8080
#   - postgres          metrics + immutable audit log  localhost:5432
#
# Public data only; no secrets baked in. Override Postgres creds via a local
# .env (see .env.example) before anything real.

name: sentinel

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    container_name: sentinel-redpanda
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --check=false
      # Advertise localhost so host-run producer/consumer can connect.
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"   # admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redpanda-data:/var/lib/redpanda/data

  redpanda-console:
    image: redpandadata/console:v2.7.2
    container_name: sentinel-console
    depends_on:
      - redpanda
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092

  postgres:
    image: postgres:16
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentinel}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  redpanda-data:
  postgres-data:
