  <text x="60" y="504" fill="#c9d3ec" font-size="12" font-family="ui-monospace, monospace">346626cd</text>
  <text x="140" y="504" fill="#9aa3b8" font-size="11">RED · high · 2026-06-21</text>
  <rect x="440" y="492" width="112" height="20" rx="10" fill="none" stroke="#2fbf71"/>
  <text x="452" y="506" fill="#2fbf71" font-size="10">approved</text>

