  <text x="400" y="627" fill="#e6e9f0" font-size="10">approved</text>
  <text x="520" y="627" fill="#c9d3ec" font-size="10" font-family="ui-monospace, monospace">SR_26-2:VII</text>

  <!-- label: schematic -->
  <text x="936" y="656" text-anchor="end" fill="#6b7794" font-size="9">schematic — see the live demo / run locally for the real UI</text>
