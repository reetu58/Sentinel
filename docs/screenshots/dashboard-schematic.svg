  <rect x="580" y="188" width="356" height="384" rx="12" fill="#171c2c" stroke="#2a3247"/>
  <text x="596" y="212" fill="#e6e9f0" font-size="13" font-weight="600">Copilot memo</text>
  <rect x="838" y="198" width="82" height="20" rx="10" fill="none" stroke="#2fbf71"/>
  <text x="850" y="212" fill="#2fbf71" font-size="10">approved</text>

  <text x="596" y="240" fill="#4c8dff" font-size="12" font-weight="700">(a) Finding</text>
  <text x="596" y="256" fill="#e6e9f0" font-size="11">Score distribution shifted to the high</text>
  <text x="596" y="270" fill="#e6e9f0" font-size="11">(over-flagging) end. PSI 0.4673 · RED.</text>

  <text x="596" y="294" fill="#4c8dff" font-size="12" font-weight="700">(b) Business implication</text>
  <text x="596" y="310" fill="#e6e9f0" font-size="11">Over-flagging → false declines →</text>
  <text x="596" y="324" fill="#e6e9f0" font-size="11">route to Product / Sales / CX.</text>

  <text x="596" y="348" fill="#4c8dff" font-size="12" font-weight="700">(c) Policy basis</text>
  <rect x="596" y="356" width="96" height="18" rx="6" fill="#1e2436" stroke="#2a3247"/>
  <text x="604" y="369" fill="#c9d3ec" font-size="10" font-family="ui-monospace, monospace">SR_26-2:III.B</text>
  <rect x="700" y="356" width="74" height="18" rx="6" fill="#1e2436" stroke="#2a3247"/>
  <text x="708" y="369" fill="#c9d3ec" font-size="10" font-family="ui-monospace, monospace">ModelVal:3</text>
  <rect x="782" y="356" width="96" height="18" rx="6" fill="#1e2436" stroke="#2a3247"/>
  <text x="790" y="369" fill="#c9d3ec" font-size="10" font-family="ui-monospace, monospace">SR_26-2:III.A</text>

  <text x="596" y="398" fill="#4c8dff" font-size="12" font-weight="700">(d) Recommended action</text>
  <text x="596" y="414" fill="#e6e9f0" font-size="11">Review the 0.85 threshold; convene</text>
  <text x="596" y="428" fill="#e6e9f0" font-size="11">model risk with the routed team.</text>

  <!-- gate -->
  <line x1="596" y1="446" x2="920" y2="446" stroke="#2a3247"/>
  <rect x="596" y="458" width="150" height="30" rx="8" fill="#2fbf71"/>
  <text x="636" y="478" fill="#06281a" font-size="12" font-weight="700">Approve</text>
  <rect x="756" y="458" width="150" height="30" rx="8" fill="#e5484d"/>
  <text x="800" y="478" fill="#2a0708" font-size="12" font-weight="700">Reject</text>
  <text x="596" y="512" fill="#9aa3b8" font-size="10">Nothing ships without approval. Approve/Reject resumes the</text>
  <text x="596" y="526" fill="#9aa3b8" font-size="10">paused agent graph and appends to the immutable audit log.</text>
  <text x="596" y="552" fill="#2fbf71" font-size="11">Decision recorded: approved. Graph resumed.</text>

  <!-- audit trail -->
  <rect x="24" y="584" width="912" height="60" rx="12" fill="#171c2c" stroke="#2a3247"/>
