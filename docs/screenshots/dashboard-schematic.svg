    <text x="40" y="163" fill="#9aa3b8" font-size="11">investigate · direction: high</text>

    <rect x="254" y="100" width="220" height="72" rx="10" fill="#171c2c" stroke="#2a3247"/>
    <text x="270" y="122" fill="#9aa3b8" font-size="10">FALSE-POSITIVE RATE</text>
    <text x="270" y="146" fill="#e6e9f0" font-size="22" font-weight="700">0.058</text>
    <text x="270" y="163" fill="#9aa3b8" font-size="11">precision 0.41 · recall 0.93</text>

    <rect x="484" y="100" width="220" height="72" rx="10" fill="#171c2c" stroke="#2a3247"/>
    <rect x="484" y="100" width="4" height="72" fill="#e8a33d"/>
    <text x="500" y="122" fill="#9aa3b8" font-size="10">TREND</text>
    <text x="500" y="146" fill="#e6e9f0" font-size="22" font-weight="700">RISING ↑</text>
    <text x="500" y="163" fill="#9aa3b8" font-size="11">slope/day 0.0610</text>

    <rect x="714" y="100" width="222" height="72" rx="10" fill="#171c2c" stroke="#2a3247"/>
    <rect x="714" y="100" width="4" height="72" fill="#e5484d"/>
    <text x="730" y="122" fill="#9aa3b8" font-size="10">WORST FAIRNESS GAP (FPR)</text>
    <text x="730" y="146" fill="#e6e9f0" font-size="22" font-weight="700">+0.452</text>
    <text x="730" y="163" fill="#9aa3b8" font-size="11">slice 65+ vs overall</text>
  </g>

  <!-- band-wise chart card -->
  <rect x="24" y="188" width="540" height="252" rx="12" fill="#171c2c" stroke="#2a3247"/>
  <text x="40" y="212" fill="#e6e9f0" font-size="13" font-weight="600">Band-wise PSI breakdown · score distribution</text>
