  <line x1="48" y1="400" x2="548" y2="400" stroke="#3a4255"/>
  <!-- bar pairs: expected (grey) vs actual (green gain / red loss). Low bins lost mass, high bins gained. -->
  <g>
    <!-- bin 0 (lost) --><rect x="52" y="300" width="18" height="100" fill="#6b7794"/><rect x="72" y="340" width="18" height="60" fill="#e5484d"/>
    <!-- bin 1 --><rect x="102" y="305" width="18" height="95" fill="#6b7794"/><rect x="122" y="345" width="18" height="55" fill="#e5484d"/>
    <!-- bin 2 --><rect x="152" y="310" width="18" height="90" fill="#6b7794"/><rect x="172" y="350" width="18" height="50" fill="#e5484d"/>
    <!-- bin 3 --><rect x="202" y="312" width="18" height="88" fill="#6b7794"/><rect x="222" y="358" width="18" height="42" fill="#e5484d"/>
    <!-- bin 4 (flat) --><rect x="252" y="330" width="18" height="70" fill="#6b7794"/><rect x="272" y="332" width="18" height="68" fill="#6b7794"/>
    <!-- bin 5 --><rect x="302" y="330" width="18" height="70" fill="#6b7794"/><rect x="322" y="322" width="18" height="78" fill="#2fbf71"/>
    <!-- bin 6 (gain) --><rect x="352" y="325" width="18" height="75" fill="#6b7794"/><rect x="372" y="290" width="18" height="110" fill="#2fbf71"/>
    <!-- bin 7 --><rect x="402" y="322" width="18" height="78" fill="#6b7794"/><rect x="422" y="278" width="18" height="122" fill="#2fbf71"/>
    <!-- bin 8 --><rect x="452" y="320" width="18" height="80" fill="#6b7794"/><rect x="472" y="268" width="18" height="132" fill="#2fbf71"/>
    <!-- bin 9 (biggest gain) --><rect x="502" y="318" width="18" height="82" fill="#6b7794"/><rect x="522" y="258" width="18" height="142" fill="#2fbf71"/>
  </g>
  <text x="60" y="418" fill="#9aa3b8" font-size="9">[-inf,0.1)</text>
  <text x="300" y="418" fill="#9aa3b8" font-size="9">← score bins low → high →</text>
  <text x="505" y="418" fill="#9aa3b8" font-size="9">[0.9,inf)</text>
  <text x="40" y="434" fill="#9aa3b8" font-size="10">Green = distribution gained mass here (high-side over-flagging shift).</text>

