  <rect x="40" y="614" width="896" height="18" rx="4" fill="rgba(76,141,255,0.10)"/>
  <text x="48" y="627" fill="#9aa3b8" font-size="10" font-family="ui-monospace, monospace">2026-06-21 08:23:19</text>
